<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Art & Illustration | Angelina Loh</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="transitions.js" defer></script>
  </head>
  <body>
    <div id="navbar-placeholder"></div>
    <main>
      <h2>Art & Illustration (WIP)</h2>
      <p class="page-intro">Digitally illustrating anime-style characters.</p>
      <div class="carousel">
        <button class="carousel-btn prev">«</button>
        <div class="carousel-track-container">
          <div class="carousel-track">
            <img src="images/illustration_card.png" alt="illustration" class="carousel-img" />
            <img src="images/Sunny-rrito Sticker Art.png" alt="sunny-rrito" class="carousel-img" />
            <img src="images/celeste_animal_crossing.PNG" alt="celeste" class="carousel-img" />
            <img src="images/MunchBolo Week 2026 1.png" alt="munchbolo" class="carousel-img" />
          </div>
        </div>
        <button class="carousel-btn next">»</button>
      </div>
    </main>

    <script type="text/javascript">
      $(document).ready(function () {
        $("#navbar-placeholder").load("navbar.html");

        let current = 0;
        const imgs = $(".carousel-img");
        const total = imgs.length;

        function showSlide(index) {
          imgs.removeClass("active");
          $(imgs[index]).addClass("active");
        }

        showSlide(current);

        $(".next").click(function () {
          current = (current + 1) % total;
          showSlide(current);
        });

        $(".prev").click(function () {
          current = (current - 1 + total) % total;
          showSlide(current);
        });
      });
    </script>
  </body>
</html>
